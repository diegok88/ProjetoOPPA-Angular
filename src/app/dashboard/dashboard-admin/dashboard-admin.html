<div class="dashboard">
  <header class="container-header">
    <div class="container-centralized">
      <img class="logo" src="images/logoOPPA-1.png" alt="logo" />
    </div>
    <div class="container-centralized center">
      <h1>S. A. Têxteis Ltda</h1>
    </div>
    <div class="container-user-logout">
      <span class="user">
        <img class="icons" src="icons/account_circle.png" alt="usuario" />
        <h3>6067</h3>
      </span>
      <span class="logout">
        <img class="icons" src="icons/exit_to_app.png" alt="sair" />
        <h3>Sair</h3>
      </span>
    </div>
  </header>
  <aside class="container-aside" [class.sidebar-collapsed]="isSidebarCollapsed()">
    <nav>
      <ul>
        <li>
          <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <img class="icons" src="icons/home.png" alt="Home" />
            <span class="nav-text" [class.hidden]="isSidebarCollapsed()">Principal</span>
          </a>
        </li>
        <li class="has-submenu" [class.open]="activeSubmenu() === 'operacional'">
          <a (click)="toggleOperacionalSubmenu($event)">
            <img class="icons" src="icons/badge.png" alt="Operacional" />
            <span class="nav-text" [class.hidden]="isSidebarCollapsed()">Operacional</span>
            <span
              class="icons"
              class="arrow"
              [class.rotated]="activeSubmenu() === 'operacional'"
              [class.hidden]="isSidebarCollapsed()"
              ><img src="icons/arrow_drop_down.png" alt="seta para baixo"
            /></span>
          </a>
          <ul class="submenu" [class.open]="activeSubmenu() === 'operacional'">
            <li>
              <a routerLink="" routerLinkActive="">
                <img class="icons" src="icons/add_box.png" alt="Cadastro" />
                <span class="nav-text">Cadastros</span>
              </a>
            </li>
            <li>
              <a routerLink="" routerLinkActive="">
                <img class="icons" src="icons/swap_horizontal_circle.png" alt="Alocação" />
                <span class="nav-text">Alocações</span>
              </a>
            </li>
            <li>
              <a routerLink="" routerLinkActive="">
                <img class="icons" src="icons/calendar_add_on.png" alt="Dispensa" />
                <span class="nav-text">Dispensas</span>
              </a>
            </li>
            <li>
              <a routerLink="" routerLinkActive="">
                <img class="icons" src="icons/dangerous.png" alt="Penalidade" />
                <span class="nav-text">Penalidades</span>
              </a>
            </li>
          </ul>
        </li>
        <li class="has-submenu" [class.open]="activeSubmenu() === 'solicitacao'">
          <a (click)="toggleSolicitacaoSubmenu($event)">
            <img class="icons" src="icons/list_alt.png" alt="Solicitações" />
            <span class="nav-text" [class.hidden]="isSidebarCollapsed()">Solicitações</span>
            <span
              class="arrow"
              [class.rotated]="activeSubmenu() === 'solicitacao'"
              [class.hidden]="isSidebarCollapsed()"
            >
              <img src="icons/arrow_drop_down.png" alt="seta para baixo" />
            </span>
          </a>
          <ul class="submenu" [class.open]="activeSubmenu() === 'solicitacao'">
            <li>
              <a routerLink="" routerLinkActive="">
                <img class="icons" src="icons/box_edit.png" alt="Escrever" />
                <span class="nav-text">Escrever</span>
              </a>
            </li>
            <li>
              <a routerLink="" routerLinkActive="">
                <img class="icons" src="icons/outbox.png" alt="Enviadas" />
                <span class="nav-text">Enviadas</span>
              </a>
            </li>
            <li>
              <a routerLink="" routerLinkActive="">
                <img class="icons" src="icons/move_to_inbox.png" alt="Recebidas" />
                <span class="nav-text">Recebidas</span>
              </a>
            </li>
          </ul>
        </li>
        <!-- Escrever, Enviadas, Recebidas -->
        <li>
          <a href="">
            <img class="icons" src="icons/insert_chart.png" alt="Eficiência" />
            <span class="nav-text">Eficiência</span>
          </a>
        </li>
        <li>
          <a href="">
            <img class="icons" src="icons/post_add.png" alt="Cadastros" />
            <span class="nav-text">Cadastros</span>
          </a>
        </li>
        <li>
          <a href="">
            <img class="icons" src="icons/account_box.png" alt="Usuário" />
            <span class="nav-text">Usuário</span>
          </a>
        </li>
      </ul>
    </nav>
    <div class="reduce-sidebar">
      <span (click)="toggleSidebar()">
        <img class="icons" src="icons/dock_to_right.png" alt="Reduzir Sidebar" />
      </span>
    </div>
  </aside>
  <main>
    <p>main</p>
  </main>
  <footer class="container-footer">
    <p class="text-developed">Desenvolvido por DDK</p>
  </footer>
</div>
